name: Code checks

on:
  push:
  workflow_call:

env:
  UV_VERSION: 0.10.11

jobs:
  Tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        PYTHON_VERSION: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.PYTHON_VERSION }}
          enable-cache: 'true'
          cache-suffix: ${{ matrix.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          uv sync --locked
      - name: Test the library
        run: |
          uv run poe check-all
  Demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.12"
          enable-cache: 'true'
          cache-suffix: "3.12"
      - name: Install dependencies
        run: |
          uv sync --locked
      - name: Regenerate demo PNG
        run: |
          uv run poe generate-demo
      - name: Check demo PNG is up to date
        run: |
          if ! git diff --quiet demo/demo.png; then
            echo "::error::demo/demo.png is stale. Regenerate with: uv run poe generate-demo"
            exit 1
          fi
